name: Deploy Firebase Rules

on:
  push:
    branches:
      - master
    paths:
      - database.rules.json
      - storage.rules
      - firebase.json
      - .github/workflows/firebase-rules.yml
  workflow_dispatch:

jobs:
  deploy_rules:
    name: Deploy Realtime Database and Storage rules
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MUNCOORDINATED }}

      - name: Deploy database and storage rules
        run: yarn deploy:rules
